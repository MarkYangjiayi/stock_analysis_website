services:
  # 1. 换上目前最稳的最新版 WARP 镜像
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    container_name: quantify_warp
    restart: always

  backend:
    image: quantify-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      # 2. 注意这里！新镜像的默认 SOCKS5 端口是 9091
      - HTTP_PROXY=socks5h://warp:9091
      - HTTPS_PROXY=socks5h://warp:9091
      - ALL_PROXY=socks5h://warp:9091
      - NO_PROXY=localhost,127.0.0.1,yahoo.com,.yahoo.com,finance.yahoo.com
    depends_on:
      - warp

  frontend:
    image: quantify-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend